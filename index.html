<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Drive Time" />
  <title>Drive Time Estimator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f2f2f7;
      min-height: 100vh;
      padding: env(safe-area-inset-top, 20px) 16px 32px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #000;
      margin: 24px 0 20px;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
      align-items: center;
    }

    input[type="number"] {
      flex: 1;
      font-size: 16px;
      padding: 12px 14px;
      border: none;
      border-radius: 12px;
      background: #fff;
      color: #000;
      outline: none;
      -webkit-appearance: none;
    }

    .toggle {
      display: flex;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .toggle button {
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 500;
      border: none;
      background: transparent;
      color: #888;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .toggle button.active {
      background: #007aff;
      color: #fff;
      border-radius: 10px;
    }

    .toggle.vehicle button.active {
      background: #34c759;
      color: #fff;
      border-radius: 10px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 16px 8px;
      text-align: center;
    }

    .card.fastest {
      border: 2px solid #007aff;
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 999px;
      background: #e5f0ff;
      color: #007aff;
      margin-bottom: 8px;
    }

    .spacer { height: 23px; }

    .speed-label {
      font-size: 13px;
      color: #888;
      margin-bottom: 6px;
    }

    .time-val {
      font-size: 20px;
      font-weight: 600;
      color: #000;
      line-height: 1.2;
    }

    .time-sub {
      font-size: 12px;
      color: #aaa;
      margin-top: 4px;
    }

    .fuel-info {
      background: #fff;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 13px;
      color: #555;
      line-height: 1.8;
      margin-bottom: 10px;
    }

    .fuel-info .label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #aaa;
      margin-bottom: 6px;
    }

    .fuel-total {
      font-size: 28px;
      font-weight: 700;
      color: #34c759;
    }

    .fuel-breakdown {
      font-size: 13px;
      color: #888;
      margin-top: 2px;
    }

    .price-note {
      font-size: 12px;
      color: #bbb;
      text-align: center;
      margin-top: 2px;
    }

    .placeholder {
      text-align: center;
      color: #aaa;
      font-size: 15px;
      margin-top: 40px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <h1>Drive Time</h1>

  <div class="row">
    <input type="number" id="distInput" placeholder="Enter distance..." min="0" oninput="calculate()" />
    <div class="toggle">
      <button class="active" id="btn-mi" onclick="setUnit('mi')">mi</button>
      <button id="btn-km" onclick="setUnit('km')">km</button>
    </div>
  </div>

  <div class="row">
    <div class="toggle vehicle" style="width:100%;">
      <button class="active" id="btn-car" onclick="setVehicle('car')" style="flex:1;">Car (35 mpg)</button>
      <button id="btn-truck" onclick="setVehicle('truck')" style="flex:1;">Truck (15 mpg)</button>
    </div>
  </div>

  <div id="results">
    <p class="placeholder">Enter a distance above<br>to see your drive times.</p>
  </div>

</body>
<script>
  let unit = 'mi';
  let vehicle = 'car';

  const config = {
    car:   { mpg: 35, pricePerGallon: 3.27, fuelLabel: 'Regular gas, Lexington KY', priceDate: 'Mar 16, 2026' },
    truck: { mpg: 15, pricePerGallon: 4.56, fuelLabel: 'Diesel, Lexington KY',      priceDate: 'Mar 16, 2026' }
  };

  function setUnit(u) {
    unit = u;
    document.getElementById('btn-mi').classList.toggle('active', u === 'mi');
    document.getElementById('btn-km').classList.toggle('active', u === 'km');
    calculate();
  }

  function setVehicle(v) {
    vehicle = v;
    document.getElementById('btn-car').classList.toggle('active', v === 'car');
    document.getElementById('btn-truck').classList.toggle('active', v === 'truck');
    calculate();
  }

  function formatTime(hours) {
    if (!isFinite(hours) || hours <= 0) return '—';
    const h = Math.floor(hours);
    const m = Math.round((hours - h) * 60);
    if (h === 0) return m + ' min';
    if (m === 0) return h + ' hr';
    return h + ' hr ' + m + ' min';
  }

  function calculate() {
    const raw = parseFloat(document.getElementById('distInput').value);
    const container = document.getElementById('results');

    if (isNaN(raw) || raw <= 0) {
      container.innerHTML = '<p class="placeholder">Enter a distance above<br>to see your drive times.</p>';
      return;
    }

    const distMi = unit === 'mi' ? raw : raw / 1.60934;
    const { mpg, pricePerGallon, fuelLabel, priceDate } = config[vehicle];
    const gallonsUsed = distMi / mpg;
    const totalCost = gallonsUsed * pricePerGallon;

    const speeds = [65, 70, 75];

    const cards = speeds.map((speed, i) => {
      const hours = distMi / speed;
      const isFastest = i === speeds.length - 1;
      return `
        <div class="card${isFastest ? ' fastest' : ''}">
          ${isFastest ? '<div class="badge">fastest</div>' : '<div class="spacer"></div>'}
          <div class="speed-label">${speed} mph</div>
          <div class="time-val">${formatTime(hours)}</div>
          <div class="time-sub">${hours.toFixed(2)} hrs</div>
        </div>`;
    }).join('');

    const fuelSection = `
      <div class="fuel-info">
        <div class="label">Estimated fuel cost</div>
        <div class="fuel-total">$${totalCost.toFixed(2)}</div>
        <div class="fuel-breakdown">${distMi.toFixed(1)} mi &divide; ${mpg} mpg = ${gallonsUsed.toFixed(2)} gal &times; $${pricePerGallon.toFixed(2)}</div>
      </div>
      <p class="price-note">${fuelLabel} &mdash; price as of ${priceDate}</p>`;

    container.innerHTML = `<div class="cards">${cards}</div>${fuelSection}`;
  }
</script>
</html>
