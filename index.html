<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Trip Cost" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />
  <title>Trip Cost</title>
  <script src="config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f2f2f7;
      min-height: 100vh;
      padding: env(safe-area-inset-top, 20px) 16px 32px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #000;
      margin: 24px 0 20px;
    }

    .mode-toggle {
      display: flex;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 14px;
    }

    .mode-toggle button {
      flex: 1;
      padding: 12px;
      font-size: 14px;
      font-weight: 500;
      border: none;
      background: transparent;
      color: #888;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .mode-toggle button.active {
      background: #007aff;
      color: #fff;
      border-radius: 10px;
    }

    .section { margin-bottom: 14px; }

    input[type="text"], input[type="number"] {
      width: 100%;
      font-size: 16px;
      padding: 12px 14px;
      border: none;
      border-radius: 12px;
      background: #fff;
      color: #000;
      outline: none;
      -webkit-appearance: none;
      margin-bottom: 8px;
      display: block;
    }

    input[type="text"]::placeholder,
    input[type="number"]::placeholder { color: #bbb; }

    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
    }

    .row input { margin-bottom: 0; flex: 1; }

    .toggle {
      display: flex;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .toggle button {
      padding: 10px 12px;
      font-size: 15px;
      font-weight: 500;
      border: none;
      background: transparent;
      color: #888;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .toggle button.active {
      background: #007aff;
      color: #fff;
      border-radius: 10px;
    }

    .toggle.vehicle button.active {
      background: #34c759;
      color: #fff;
      border-radius: 10px;
    }

    .lookup-btn {
      width: 100%;
      padding: 13px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      background: #007aff;
      color: #fff;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      margin-bottom: 14px;
    }

    .lookup-btn:active { opacity: 0.8; }
    .lookup-btn:disabled { background: #aaa; }

    .cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 16px 8px;
      text-align: center;
    }

    .card.fastest { border: 2px solid #007aff; }
    .card.slowest { border: 2px solid #ff9500; }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 999px;
      background: #e5f0ff;
      color: #007aff;
      margin-bottom: 8px;
    }

    .badge.slowest {
      background: #fff2e5;
      color: #ff9500;
    }

    .spacer { height: 23px; }

    .speed-label { font-size: 13px; color: #888; margin-bottom: 6px; }

    .time-val {
      font-size: 20px;
      font-weight: 600;
      color: #000;
      line-height: 1.2;
    }

    .time-sub { font-size: 12px; color: #aaa; margin-top: 4px; }

    .fuel-info {
      background: #fff;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 13px;
      color: #555;
      line-height: 1.8;
      margin-bottom: 10px;
    }

    .fuel-info .label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #aaa;
      margin-bottom: 6px;
    }

    .fuel-total {
      font-size: 28px;
      font-weight: 700;
      color: #34c759;
    }

    .fuel-breakdown { font-size: 13px; color: #888; margin-top: 2px; }

    .dist-summary {
      background: #fff;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 13px;
      color: #555;
      margin-bottom: 14px;
      text-align: center;
    }

    .dist-summary strong { color: #000; }

    .price-note { font-size: 12px; color: #bbb; text-align: center; margin-top: 2px; }

    .error-msg {
      background: #fff0f0;
      color: #c0392b;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      margin-bottom: 14px;
      text-align: center;
    }

    .placeholder {
      text-align: center;
      color: #aaa;
      font-size: 15px;
      margin-top: 40px;
      line-height: 1.6;
    }

    .hidden { display: none; }
  </style>
</head>
<body>

  <h1>Trip Cost</h1>

  <div class="mode-toggle">
    <button class="active" id="btn-addr" onclick="setMode('address')">By address</button>
    <button id="btn-dist" onclick="setMode('distance')">By distance</button>
  </div>

  <!-- Address mode -->
  <div id="addr-section" class="section">
    <input type="text" id="origin" placeholder="Starting address" />
    <input type="text" id="destination" placeholder="Destination address" />
    <button class="lookup-btn" id="lookup-btn" onclick="lookupDistance()">Calculate route</button>
  </div>

  <!-- Distance mode -->
  <div id="dist-section" class="section hidden">
    <div class="row">
      <input type="number" id="distInput" placeholder="Enter distance..." min="0" oninput="calculate()" />
      <div class="toggle">
        <button class="active" id="btn-mi" onclick="setUnit('mi')">mi</button>
        <button id="btn-km" onclick="setUnit('km')">km</button>
      </div>
    </div>
  </div>

  <!-- Vehicle toggle (always visible) -->
  <div class="toggle vehicle" style="width:100%; margin-bottom: 14px;">
    <button class="active" id="btn-car" onclick="setVehicle('car')" style="flex:1;">
      <div>Car</div>
      <div style="font-size:12px; font-weight:400; margin-top:2px;">35 mpg</div>
    </button>
    <button id="btn-truck" onclick="setVehicle('truck')" style="flex:1;">
      <div>Truck</div>
      <div style="font-size:12px; font-weight:400; margin-top:2px;">14.7 mpg</div>
    </button>
    <button id="btn-camper" onclick="setVehicle('camper')" style="flex:1;">
      <div>Truck/Camper</div>
      <div style="font-size:12px; font-weight:400; margin-top:2px;">12.8 mpg</div>
    </button>
  </div>

  <div id="results">
    <p class="placeholder">Enter addresses or a distance<br>to see your trip cost.</p>
  </div>

</body>
<script>
  const ORS_API_KEY = CONFIG.ORS_API_KEY;

  let mode = 'address';
  let unit = 'mi';
  let vehicle = 'car';
  let resolvedMiles = null;

  const config = {
    car:    { mpg: 35,    fuelType: 'regular', fuelLabel: 'Regular gas, US avg' },
    truck:  { mpg: 14.69, fuelType: 'diesel',  fuelLabel: 'Diesel, US avg' },
    camper: { mpg: 12.78, fuelType: 'diesel',  fuelLabel: 'Diesel, US avg' }
  };

  // Price fetching and caching
  let priceData = null;

  async function fetchCurrentPrices() {
    try {
      // Check if we have prices cached for this week
      const cached = localStorage.getItem('fuelPrices');
      const now = new Date();
      const weekStart = new Date(now.getFullYear(), now.getMonth(), now.getDate() - now.getDay());
      const weekKey = weekStart.toDateString();
      
      if (cached) {
        const parsed = JSON.parse(cached);
        if (parsed.weekKey === weekKey) {
          priceData = parsed;
          return priceData;
        }
      }

      // Fetch new prices from EIA API
      // Using US national average regular gasoline and No. 2 diesel retail prices (weekly data)
      const EIA_API_KEY = CONFIG.EIA_API_KEY;
      
      if (!EIA_API_KEY || EIA_API_KEY === 'PASTE_YOUR_EIA_API_KEY_HERE') {
        console.log('EIA API key not configured, using fallback prices');
        const fallbackPrices = {
          regular: 3.27,
          diesel: 4.56,
          weekKey: weekKey,
          source: 'Fallback prices (no EIA key)',
          lastUpdated: new Date().toISOString()
        };
        localStorage.setItem('fuelPrices', JSON.stringify(fallbackPrices));
        priceData = fallbackPrices;
        return priceData;
      }

      // Try to fetch US national average prices (more reliable than state-specific)
      try {
        // US Regular Gasoline Retail Price (weekly)
        const gasUrl = `https://api.eia.gov/v2/petroleum/pri/gnd/data/?api_key=${EIA_API_KEY}&frequency=weekly&data[0]=value&facets[duoarea][]=NUS&facets[product][]=EPM0&sort[0][column]=period&sort[0][direction]=desc&offset=0&length=1`;
        
        // US No. 2 Diesel Retail Price (weekly)  
        const dieselUrl = `https://api.eia.gov/v2/petroleum/pri/gnd/data/?api_key=${EIA_API_KEY}&frequency=weekly&data[0]=value&facets[duoarea][]=NUS&facets[product][]=EPD2DXL0&sort[0][column]=period&sort[0][direction]=desc&offset=0&length=1`;

        const [gasResponse, dieselResponse] = await Promise.all([
          fetch(gasUrl),
          fetch(dieselUrl)
        ]);

        let gasPrice = 3.27; // Fallback
        let dieselPrice = 4.56; // Fallback
        let source = 'EIA US Average';
        let hasApiData = false;

        if (gasResponse.ok) {
          const gasData = await gasResponse.json();
          if (gasData.response && gasData.response.data && gasData.response.data.length > 0) {
            gasPrice = parseFloat(gasData.response.data[0].value) || 3.27;
            hasApiData = true;
          }
        }

        if (dieselResponse.ok) {
          const dieselData = await dieselResponse.json();
          if (dieselData.response && dieselData.response.data && dieselData.response.data.length > 0) {
            dieselPrice = parseFloat(dieselData.response.data[0].value) || 4.56;
            hasApiData = true;
          }
        }

        if (!hasApiData) {
          throw new Error('No data returned from EIA API');
        }

        const newPrices = {
          regular: gasPrice,
          diesel: dieselPrice,
          weekKey: weekKey,
          source: source,
          lastUpdated: new Date().toISOString()
        };

        localStorage.setItem('fuelPrices', JSON.stringify(newPrices));
        priceData = newPrices;
        return priceData;

      } catch (apiError) {
        console.log('EIA API error, using fallback:', apiError.message);
        // Fallback to hardcoded prices
        const fallbackPrices = {
          regular: 3.27,
          diesel: 4.56,
          weekKey: weekKey,
          source: 'Fallback (EIA unavailable)',
          lastUpdated: new Date().toISOString()
        };
        localStorage.setItem('fuelPrices', JSON.stringify(fallbackPrices));
        priceData = fallbackPrices;
        return priceData;
      }
      
    } catch (error) {
      console.error('Error fetching fuel prices:', error);
      // Fallback to cached prices or defaults
      const cached = localStorage.getItem('fuelPrices');
      if (cached) {
        priceData = JSON.parse(cached);
        return priceData;
      }
      // Final fallback to hardcoded prices
      priceData = {
        regular: 3.27,
        diesel: 4.56,
        weekKey: 'fallback',
        source: 'Hardcoded fallback',
        lastUpdated: new Date().toISOString()
      };
      return priceData;
    }
  }

  function getPriceForVehicle(vehicleType) {
    if (!priceData) return 0;
    const fuelType = config[vehicleType].fuelType;
    return priceData[fuelType] || 0;
  }

  function setMode(m) {
    mode = m;
    resolvedMiles = null;
    document.getElementById('btn-addr').classList.toggle('active', m === 'address');
    document.getElementById('btn-dist').classList.toggle('active', m === 'distance');
    document.getElementById('addr-section').classList.toggle('hidden', m !== 'address');
    document.getElementById('dist-section').classList.toggle('hidden', m !== 'distance');
    document.getElementById('results').innerHTML = '<p class="placeholder">Enter addresses or a distance<br>to see your trip cost.</p>';
  }

  function setUnit(u) {
    unit = u;
    document.getElementById('btn-mi').classList.toggle('active', u === 'mi');
    document.getElementById('btn-km').classList.toggle('active', u === 'km');
    calculate();
  }

  function setVehicle(v) {
    vehicle = v;
    document.getElementById('btn-car').classList.toggle('active', v === 'car');
    document.getElementById('btn-truck').classList.toggle('active', v === 'truck');
    document.getElementById('btn-camper').classList.toggle('active', v === 'camper');
    calculate();
  }

  async function geocode(address) {
    const url = `https://api.openrouteservice.org/geocode/search?api_key=${ORS_API_KEY}&text=${encodeURIComponent(address)}&size=1`;
    const res = await fetch(url);
    const data = await res.json();
    if (!data.features || data.features.length === 0) throw new Error(`Could not find: "${address}"`);
    return data.features[0].geometry.coordinates; // [lng, lat]
  }

  async function lookupDistance() {
    const origin = document.getElementById('origin').value.trim();
    const destination = document.getElementById('destination').value.trim();
    const btn = document.getElementById('lookup-btn');
    const results = document.getElementById('results');

    if (!origin || !destination) {
      results.innerHTML = '<div class="error-msg">Please enter both a starting address and a destination.</div>';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Looking up route...';
    results.innerHTML = '<p class="placeholder">Fetching route...</p>';

    try {
      const [originCoords, destCoords] = await Promise.all([geocode(origin), geocode(destination)]);

      const routeRes = await fetch('https://api.openrouteservice.org/v2/directions/driving-car', {
        method: 'POST',
        headers: {
          'Authorization': ORS_API_KEY,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ coordinates: [originCoords, destCoords] })
      });

      const routeData = await routeRes.json();

      if (!routeData.routes || routeData.routes.length === 0) {
        throw new Error('No route found between those addresses.');
      }

      const meters = routeData.routes[0].summary.distance;
      resolvedMiles = meters / 1609.34;
      renderResults(resolvedMiles, `${resolvedMiles.toFixed(1)} mi by road`);

    } catch (err) {
      results.innerHTML = `<div class="error-msg">${err.message || 'Something went wrong. Please check your addresses and try again.'}</div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Calculate route';
    }
  }

  async function calculate() {
    // Ensure we have current prices
    if (!priceData) {
      await fetchCurrentPrices();
    }
    
    if (mode === 'address') {
      if (resolvedMiles) renderResults(resolvedMiles);
      return;
    }
    const raw = parseFloat(document.getElementById('distInput').value);
    if (isNaN(raw) || raw <= 0) {
      document.getElementById('results').innerHTML = '<p class="placeholder">Enter addresses or a distance<br>to see your trip cost.</p>';
      return;
    }
    const miles = unit === 'mi' ? raw : raw / 1.60934;
    renderResults(miles);
  }

  function formatTime(hours) {
    if (!isFinite(hours) || hours <= 0) return '—';
    const h = Math.floor(hours);
    const m = Math.round((hours - h) * 60);
    if (h === 0) return m + ' min';
    if (m === 0) return h + ' hr';
    return h + ' hr ' + m + ' min';
  }

  function renderResults(distMi, distLabel) {
    const vehicleConfig = config[vehicle];
    const pricePerGallon = getPriceForVehicle(vehicle);
    const gallonsUsed = distMi / vehicleConfig.mpg;
    const totalCost = gallonsUsed * pricePerGallon;
    const speeds = [75, 70, 65, 60];

    const summary = distLabel
      ? `<div class="dist-summary">Route distance: <strong>${distLabel}</strong></div>`
      : '';

    const cards = speeds.map((speed, i) => {
      const hours = distMi / speed;
      const isFastest = i === 0;
      const isSlowest = i === speeds.length - 1;
      let badge = '';
      let cardClass = 'card';
      
      if (isFastest) {
        badge = '<div class="badge">fastest</div>';
        cardClass += ' fastest';
      } else if (isSlowest) {
        badge = '<div class="badge slowest">slowest</div>';
        cardClass += ' slowest';
      } else {
        badge = '<div class="spacer"></div>';
      }
      
      return `
        <div class="${cardClass}">
          ${badge}
          <div class="speed-label">${speed} mph</div>
          <div class="time-val">${formatTime(hours)}</div>
          <div class="time-sub">${hours.toFixed(2)} hrs</div>
        </div>`;
    }).join('');

    const priceDate = priceData ? 
      (priceData.source ? `${priceData.source}, week of ${new Date(priceData.weekKey || priceData.lastUpdated).toLocaleDateString()}` : priceData.date || 'Unknown') 
      : 'Unknown';
    const fuelSection = `
      <div class="fuel-info">
        <div class="label">Estimated fuel cost</div>
        <div class="fuel-total">$${totalCost.toFixed(2)}</div>
        <div class="fuel-breakdown">${distMi.toFixed(1)} mi &divide; ${vehicleConfig.mpg} mpg = ${gallonsUsed.toFixed(2)} gal &times; $${pricePerGallon.toFixed(2)}</div>
      </div>
      <p class="price-note">${vehicleConfig.fuelLabel} &mdash; ${priceDate}</p>`;

    document.getElementById('results').innerHTML = summary + `<div class="cards">${cards}</div>` + fuelSection;
  }

  // Initialize prices when the page loads
  fetchCurrentPrices();
</script>
</html>
